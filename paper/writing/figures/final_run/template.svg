    <text x="1022" y="343" class="af-text-small" font-size="10px">&lt;AF&gt;02</text>
  </g>

  <!-- Slot 4: Normal -->
  <rect x="860" y="375" width="190" height="45" class="node-box" fill="#fff"/>
  <text x="920" y="403" class="box-label" style="text-anchor:start">Normal</text>
  <rect x="1000" y="380" width="35" height="35" fill="#a0a0ff"/> <!-- Normal map placeholder -->

  <!-- Texture Assets -->
  <g transform="translate(680, 500)">
    <path d="M0,0 L40,0 L55,15 L55,60 L0,60 Z" fill="none" stroke="#000" stroke-width="2"/>
    <polyline points="40,0 40,15 55,15" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M10,50 L20,35 L30,45 L35,30 L50,50 Z" fill="#333"/>
    <text x="27" y="80" class="label-text">Texture</text>
    <text x="27" y="100" class="label-text">Assets</text>
  </g>

