<svg width="1593" height="672" viewBox="0 0 1593 672" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888" />
    </marker>
    <style>
      .stage-bg-1 { fill: #dae8fc; rx: 30; }
      .stage-bg-2 { fill: #d5e8d4; rx: 30; }
      .stage-bg-3 { fill: #fff2cc; rx: 30; }
      .stage-title { font-family: Georgia, serif; font-weight: bold; font-size: 28px; text-anchor: middle; fill: #000; }
      .label-text { font-family: Arial, sans-serif; font-size: 18px; text-anchor: middle; fill: #000; }
      .small-text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; fill: #000; }
      .box-label { font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; fill: #000; }
      .af-placeholder { fill: #808080; stroke: black; stroke-width: 2; }
      .af-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 32px; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .af-text-small { font-family: Arial, sans-serif; font-weight: bold; font-size: 18px; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .conn-line { fill: none; stroke: #888; stroke-width: 2; marker-end: url(#arrow); }
      .node-box { fill: #f5f5f5; stroke: #666; stroke-width: 1; rx: 5; }
      .icon-stroke { fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #333; }
    </style>
  </defs>

  <!-- Background Stages -->
  <rect x="25" y="50" width="555" height="590" class="stage-bg-1" />
  <rect x="605" y="50" width="595" height="590" class="stage-bg-2" />
  <rect x="1225" y="50" width="340" height="590" class="stage-bg-3" />

  <!-- Stage Titles -->
  <text x="302" y="90" class="stage-title">Stage 1: USD Traversal</text>
  <text x="902" y="90" class="stage-title">Stage 2: Material Conversion</text>
  <text x="1395" y="90" class="stage-title">Stage 3: Path Rewriting</text>

  <!-- STAGE 1 CONTENT -->

  <!-- Root USD File Icon -->
  <g transform="translate(60, 210)">
    <path d="M10,0 L50,0 L70,20 L70,80 L10,80 Z" fill="none" stroke="#000" stroke-width="2"/>
    <polyline points="50,0 50,20 70,20" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="30" x2="60" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="45" x2="60" y2="45" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="60" x2="40" y2="60" stroke="#000" stroke-width="2"/>
    <text x="40" y="100" class="label-text">Root</text>
    <text x="40" y="120" class="label-text">USD File</text>
  </g>

  <!-- Recursive Discovery Placeholder <AF>09 -->
  <path d="M130,250 L170,250" class="conn-line" />
  <g id="AF09">
    <rect x="170" y="195" width="130" height="80" class="af-placeholder"/>
    <text x="235" y="235" class="af-text">&lt;AF&gt;09</text>
  </g>

  <!-- List Items -->
  <g transform="translate(340, 125)">
    <!-- Sublayers -->
    <path d="M-40,110 C-20,110 -20,15 0,15" class="conn-line" fill="none"/>
    <rect x="0" y="0" width="130" height="35" class="node-box"/>
    <text x="65" y="18" class="box-label">Sublayers</text>
    
    <!-- References -->
    <path d="M-40,110 C-20,110 -20,60 0,60" class="conn-line" fill="none"/>
    <rect x="0" y="45" width="130" height="35" class="node-box"/>
    <text x="65" y="63" class="box-label">References</text>

    <!-- Payloads -->
    <path d="M-40,110 C-20,110 -20,105 0,105" class="conn-line" fill="none"/>
    <rect x="0" y="90" width="130" height="35" class="node-box"/>
    <text x="65" y="108" class="box-label">Payloads</text>

    <!-- Variants -->
    <path d="M-40,110 C-20,110 -20,150 0,150" class="conn-line" fill="none"/>
    <rect x="0" y="135" width="130" height="35" class="node-box"/>
    <text x="65" y="153" class="box-label">Variants</text>
  </g>

  <!-- Dependency Graph Icon -->
  <g transform="translate(305, 380)">
    <!-- Arrows from list to here -->
    <path d="M100,-220 C100,-150 0,-100 0,-30" class="conn-line" fill="none"/>
    
    <!-- Icon -->
    <circle cx="0" cy="0" r="8" fill="#000"/>
    <circle cx="-20" cy="-20" r="6" fill="#000"/>
    <circle cx="20" cy="-20" r="6" fill="#000"/>
    <circle cx="-20" cy="20" r="6" fill="#000"/>
    <circle cx="20" cy="20" r="6" fill="#000"/>
    <line x1="0" y1="0" x2="-20" y2="-20" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="-20" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="0" x2="-20" y2="20" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="20" stroke="#000" stroke-width="2"/>
    
    <text x="0" y="50" class="label-text">Dependency Graph</text>
  </g>

  <!-- Placeholders <AF>01 and <AF>04 -->
  <!-- Connections -->
  <path d="M290,410 C290,460 220,460 220,500" class="conn-line" fill="none"/>
  <path d="M320,410 C320,460 370,460 370,500" class="conn-line" fill="none"/>

  <g id="AF01">
    <rect x="165" y="510" width="125" height="110" class="af-placeholder"/>
    <text x="227" y="565" class="af-text">&lt;AF&gt;01</text>
  </g>

  <g id="AF04">
    <rect x="310" y="510" width="125" height="110" class="af-placeholder"/>
    <text x="372" y="565" class="af-text">&lt;AF&gt;04</text>
  </g>

  <!-- Placeholder <AF>06 -->
  <path d="M350,395 L500,395" class="conn-line" />
  <g id="AF06">
    <rect x="500" y="370" width="55" height="55" class="af-placeholder"/>
    <text x="527" y="397" class="af-text-small">&lt;AF&gt;06</text>
  </g>
  <text x="527" y="440" class="label-text">Asset</text>
  <text x="527" y="460" class="label-text">File List</text>

  <!-- STAGE 2 CONTENT -->

  <!-- Placeholder <AF>10 -->
  <path d="M555,395 C580,395 590,285 620,285" class="conn-line" fill="none"/>
  <g id="AF10">
    <rect x="620" y="210" width="115" height="155" class="af-placeholder"/>
    <text x="677" y="287" class="af-text">&lt;AF&gt;10</text>
  </g>

  <!-- UsdPreviewSurface Network Container -->
  <rect x="760" y="125" width="305" height="320" rx="15" fill="none" stroke="#666" stroke-width="1"/>
  <text x="912" y="155" class="label-text" font-weight="bold">UsdPreviewSurface</text>
  <text x="912" y="175" class="label-text" font-weight="bold">Network</text>
  <!-- Small icon header -->
  <path d="M800,150 L830,165 L800,180 Z" fill="#888" transform="translate(-20,-20)"/>
  
  <!-- Connections from AF10 to slots -->
  <path d="M735,280 C750,280 780,230 860,230" class="conn-line" fill="none"/>
  <path d="M735,280 C750,280 780,285 860,285" class="conn-line" fill="none"/>
  <path d="M735,280 C750,280 780,340 860,340" class="conn-line" fill="none"/>
  <path d="M735,280 C750,280 780,395 860,395" class="conn-line" fill="none"/>

  <!-- Slot 1: Base Color (Covered by AF05) -->
  <rect x="860" y="210" width="190" height="45" class="node-box" fill="#fff"/>
  <g id="AF05">
    <rect x="860" y="210" width="190" height="45" class="af-placeholder"/>
    <text x="955" y="233" class="af-text-small">&lt;AF&gt;05</text>
  </g>

  <!-- Slot 2: Roughness -->
  <rect x="860" y="265" width="190" height="45" class="node-box" fill="#fff"/>
  <text x="920" y="293" class="box-label" style="text-anchor:start">Roughness</text>
  <rect x="1000" y="270" width="35" height="35" fill="#999"/> <!-- Texture placeholder -->

  <!-- Slot 3: Metallic (Icon covered by AF02) -->
  <rect x="860" y="320" width="190" height="45" class="node-box" fill="#fff"/>
  <text x="920" y="348" class="box-label" style="text-anchor:start">Metallic</text>
  <g id="AF02">
