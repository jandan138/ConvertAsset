    <path d="M10,10 L30,30" stroke="#000" stroke-width="5" stroke-linecap="round"/>
    <circle cx="10" cy="10" r="5" stroke="#000" stroke-width="3" fill="none"/>
    <circle cx="30" cy="30" r="5" stroke="#000" stroke-width="3" fill="none"/>
    <text x="20" y="55" class="small-text">Resolve &amp;</text>
    <text x="20" y="70" class="small-text">Connect</text>
  </g>

  <!-- Connections Lower Stage 2 -->
  <path d="M740,530 C760,530 760,460 780,460" class="conn-line" fill="none"/>
  <path d="M740,530 C760,530 760,550 780,550" class="conn-line" fill="none"/>
  
  <!-- Fallback Value -->
  <rect x="785" y="525" width="40" height="40" fill="#a66e86"/>
  <text x="805" y="585" class="small-text">Fallback</text>
  <text x="805" y="605" class="small-text">Value</text>

  <!-- Placeholder <AF>03 -->
  <path d="M825,545 L920,545" class="conn-line" />
  <path d="M955,420 L955,520" class="conn-line" /> <!-- From Normal map -->
  
  <g id="AF03">
    <rect x="920" y="485" width="135" height="140" class="af-placeholder"/>
    <text x="987" y="555" class="af-text">&lt;AF&gt;03</text>
  </g>

  <!-- Processed Files Icon -->
  <g transform="translate(1120, 360)">
    <path d="M-10,-30 L30,-30 L45,-15 L45,30 L-10,30 Z" fill="none" stroke="#000" stroke-width="2"/>
    <polyline points="30,-30 30,-15 45,-15" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="-10" x2="35" y2="-10" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="5" x2="35" y2="5" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="20" x2="25" y2="20" stroke="#000" stroke-width="2"/>
    <text x="17" y="50" class="label-text">Processed</text>
    <text x="17" y="70" class="label-text">Files</text>
  </g>

  <!-- Connection to Stage 3 -->
  <path d="M1065,285 C1100,285 1100,360 1110,360" class="conn-line" fill="none"/>
  <path d="M1055,555 C1100,555 1100,450 1105,450" class="conn-line" fill="none" stroke-dasharray="5,5"/> <!-- Dashed line from AF03 -->

  <!-- STAGE 3 CONTENT -->

  <!-- Connection Processed to AF08 -->
  <path d="M1165,360 C1180,360 1180,200 1200,200" class="conn-line" fill="none"/>

  <!-- Placeholder <AF>08 -->
  <g id="AF08">
    <rect x="1245" y="130" width="150" height="140" class="af-placeholder"/>
    <text x="1320" y="200" class="af-text">&lt;AF&gt;08</text>
  </g>

  <!-- Connection AF08 to AF07 -->
  <path d="M1320,270 L1320,300" class="conn-line" />

  <!-- Placeholder <AF>07 -->
  <g id="AF07">
    <rect x="1245" y="300" width="150" height="130" class="af-placeholder"/>
    <text x="1320" y="365" class="af-text">&lt;AF&gt;07</text>
  </g>

  <!-- Connection AF07 to Target -->
  <path d="M1320,430 L1320,460" class="conn-line" />

  <!-- Target Box -->
  <rect x="1245" y="460" width="155" height="70" rx="10" fill="#fcfcfc" stroke="#999"/>
  <text x="1322" y="485" class="box-label">Target:</text>
  <text x="1322" y="505" class="box-label">*.noMDL.usd</text>

  <!-- Connection AF07 to Converted Scene -->
  <path d="M1395,365 L1440,365" class="conn-line" />

  <!-- Converted Scene Icon -->
  <g transform="translate(1450, 325)">
    <path d="M0,0 L50,0 L50,40 L0,40 Z" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M5,35 L20,20 L35,30 L45,15" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="50" cy="40" r="12" fill="#000"/>
    <path d="M44,40 L48,44 L56,36" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="25" y="70" class="label-text">Converted</text>
    <text x="25" y="90" class="label-text">Scene</text>
  </g>

</svg>