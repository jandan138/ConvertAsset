schema_version: 1
results:
  raw:
    - id: image_quality
      path: paper/shared/evidence/raw/image_quality.csv
      description: "Paired PSNR, SSIM, and LPIPS measurements."
    - id: feature_similarity
      path: paper/shared/evidence/raw/feature_similarity.csv
      description: "CLIP and DINOv2 cosine similarity measurements."
    - id: clip_embeddings
      path: paper/shared/evidence/raw/clip_embeddings.npz
      description: "CLIP embeddings used for feature-level similarity checks."
    - id: dino_embeddings
      path: paper/shared/evidence/raw/dino_embeddings.npz
      description: "DINOv2 embeddings used for similarity checks and t-SNE visualization."
    - id: performance_single_object
      path: paper/shared/evidence/raw/perf_benchmark.csv
      description: "Single-object load time, GPU memory, FPS benchmark."
    - id: performance_grscene_startup
      path: paper/shared/evidence/raw/perf_benchmark_grscene.csv
      description: "Supplemental GRScenes startup benchmark."
    - id: detection_results
      path: paper/shared/evidence/raw/detection_results.json
      description: "Zero-shot detection confidence records retained from the workshop draft."
    - id: statistical_tests
      path: paper/shared/evidence/raw/statistical_tests.json
      description: "Statistical summaries retained from the workshop draft."
    - id: render_pairs
      path: paper/shared/evidence/raw/renders/
      description: "Matched MDL and UsdPreviewSurface render pairs."
    - id: grscenes_vlm_source_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/source_manifest.json
      description: "ACL/VLM GRScenes source scene and episode selection provenance; not a model-result file."
    - id: internnav_vln_prep_manifest
      path: paper/shared/evidence/raw/internnav_vln_downstream/prep_manifest.json
      description: "InternNav/VL-LN downstream input-preparation manifest for one GRScenes SN original/no-MDL navigation pair, including external runtime wrapper metadata."
    - id: internnav_vln_smoke_results
      path: paper/shared/evidence/raw/internnav_vln_downstream/internnav_vln_results.json
      description: "One-episode real InternNav/InternVLA-N1 paired smoke result: both original and no-MDL have SR/SPL 0, while no-MDL increases TL by 33.5054 and NE by 33.7468; protocol evidence only, not a broad benchmark claim."
    - id: internnav_vln_original_episode_metrics
      path: paper/shared/evidence/raw/internnav_vln_downstream/original_episode_metrics.jsonl
      description: "Per-episode InternNav LMDB metric rows extracted from the original-condition one-episode smoke run."
    - id: internnav_vln_modified_episode_metrics
      path: paper/shared/evidence/raw/internnav_vln_downstream/modified_episode_metrics.jsonl
      description: "Per-episode InternNav LMDB metric rows extracted from the modified/no-MDL-condition one-episode smoke run."
    - id: internnav_vln_paired_episode_analysis
      path: paper/shared/evidence/raw/internnav_vln_downstream/paired_episode_analysis.json
      description: "Paired per-episode analysis scaffold over the current one smoke pair; claim gate remains acl_main_result_ready=false."
    - id: internnav_vln_video_case_manifest
      path: paper/shared/evidence/raw/internnav_vln_downstream/video_case_manifest.json
