schema_version: 1
results:
  raw:
    - id: image_quality
      path: paper/shared/evidence/raw/image_quality.csv
      description: "Paired PSNR, SSIM, and LPIPS measurements."
    - id: feature_similarity
      path: paper/shared/evidence/raw/feature_similarity.csv
      description: "CLIP and DINOv2 cosine similarity measurements."
    - id: clip_embeddings
      path: paper/shared/evidence/raw/clip_embeddings.npz
      description: "CLIP embeddings used for feature-level similarity checks."
    - id: dino_embeddings
      path: paper/shared/evidence/raw/dino_embeddings.npz
      description: "DINOv2 embeddings used for similarity checks and t-SNE visualization."
    - id: performance_single_object
      path: paper/shared/evidence/raw/perf_benchmark.csv
      description: "Single-object load time, GPU memory, FPS benchmark."
    - id: performance_grscene_startup
      path: paper/shared/evidence/raw/perf_benchmark_grscene.csv
      description: "Supplemental GRScenes startup benchmark."
    - id: detection_results
      path: paper/shared/evidence/raw/detection_results.json
      description: "Zero-shot detection confidence records retained from the workshop draft."
    - id: statistical_tests
      path: paper/shared/evidence/raw/statistical_tests.json
      description: "Statistical summaries retained from the workshop draft."
    - id: render_pairs
      path: paper/shared/evidence/raw/renders/
      description: "Matched MDL and UsdPreviewSurface render pairs."
    - id: grscenes_vlm_source_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/source_manifest.json
      description: "ACL/VLM GRScenes source scene and episode selection provenance; not a model-result file."
    - id: grscenes_vlm_target_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/target_manifest.json
      description: "ACL/VLM GRScenes target prim and world-bbox localization provenance for 40 episode records / 23 unique targets; not a model-result file."
    - id: grscenes_vlm_render_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/render_manifest.json
      description: "ACL/VLM GRScenes paired render plan for 23 unique targets, 92 original/converted view pairs, and 184 planned material-condition jobs; not rendered image evidence or a model-result file."
    - id: grscenes_vlm_target_projection_qa
      path: paper/shared/evidence/raw/grscene_vlm_grounding/target_projection_qa_report.json
      description: "Projected image-space target boxes for 10 render-smoke pairs; geometric label QA only, not visibility or model-result evidence."
    - id: grscenes_vlm_visual_review_batch
      path: paper/shared/evidence/raw/grscene_vlm_grounding/paired_render_visual_review_batch.json
      description: "Independent blind visual QA over 10 recommended render-smoke pairs; candidate filter only, not model-result evidence."
    - id: grscenes_vlm_alternative_centerline_render_summary
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_paired_render_summary.json
      description: "Render-smoke summary for 11 additional centerline-clear GRScenes view pairs after the first visual-QA pass; candidate-filter evidence only."
    - id: grscenes_vlm_alternative_centerline_target_projection_qa
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_target_projection_qa_report.json
      description: "Projected image-space target boxes for the 11 additional centerline-clear view pairs; geometric label QA only."
    - id: grscenes_vlm_alternative_centerline_visual_review
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_visual_review_batch.json
      description: "Independent blind visual QA over 11 additional centerline-clear view pairs; 3 PASS, 6 WARN, 2 FAIL candidate split."
