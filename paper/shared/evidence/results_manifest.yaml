schema_version: 1
results:
  raw:
    - id: image_quality
      path: paper/shared/evidence/raw/image_quality.csv
      description: "Paired PSNR, SSIM, and LPIPS measurements."
    - id: feature_similarity
      path: paper/shared/evidence/raw/feature_similarity.csv
      description: "CLIP and DINOv2 cosine similarity measurements."
    - id: clip_embeddings
      path: paper/shared/evidence/raw/clip_embeddings.npz
      description: "CLIP embeddings used for feature-level similarity checks."
    - id: dino_embeddings
      path: paper/shared/evidence/raw/dino_embeddings.npz
      description: "DINOv2 embeddings used for similarity checks and t-SNE visualization."
    - id: performance_single_object
      path: paper/shared/evidence/raw/perf_benchmark.csv
      description: "Single-object load time, GPU memory, FPS benchmark."
    - id: performance_grscene_startup
      path: paper/shared/evidence/raw/perf_benchmark_grscene.csv
      description: "Supplemental GRScenes startup benchmark."
    - id: detection_results
      path: paper/shared/evidence/raw/detection_results.json
      description: "Zero-shot detection confidence records retained from the workshop draft."
    - id: statistical_tests
      path: paper/shared/evidence/raw/statistical_tests.json
      description: "Statistical summaries retained from the workshop draft."
    - id: render_pairs
      path: paper/shared/evidence/raw/renders/
      description: "Matched MDL and UsdPreviewSurface render pairs."
    - id: grscenes_vlm_source_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/source_manifest.json
      description: "ACL/VLM GRScenes source scene and episode selection provenance; not a model-result file."
    - id: grscenes_vlm_target_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/target_manifest.json
      description: "ACL/VLM GRScenes target prim and world-bbox localization provenance for 40 episode records / 23 unique targets; not a model-result file."
    - id: grscenes_vlm_render_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/render_manifest.json
      description: "ACL/VLM GRScenes paired render plan for 23 unique targets, 92 original/converted view pairs, and 184 planned material-condition jobs; not rendered image evidence or a model-result file."
    - id: grscenes_vlm_target_projection_qa
      path: paper/shared/evidence/raw/grscene_vlm_grounding/target_projection_qa_report.json
      description: "Projected image-space target boxes for 10 render-smoke pairs; geometric label QA only, not visibility or model-result evidence."
    - id: grscenes_vlm_visual_review_batch
      path: paper/shared/evidence/raw/grscene_vlm_grounding/paired_render_visual_review_batch.json
      description: "Independent blind visual QA over 10 recommended render-smoke pairs; candidate filter only, not model-result evidence."
    - id: grscenes_vlm_alternative_centerline_render_summary
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_paired_render_summary.json
      description: "Render-smoke summary for 11 additional centerline-clear GRScenes view pairs after the first visual-QA pass; candidate-filter evidence only."
    - id: grscenes_vlm_alternative_centerline_target_projection_qa
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_target_projection_qa_report.json
      description: "Projected image-space target boxes for the 11 additional centerline-clear view pairs; geometric label QA only."
    - id: grscenes_vlm_alternative_centerline_visual_review
      path: paper/shared/evidence/raw/grscene_vlm_grounding/alternative_centerline_visual_review_batch.json
      description: "Independent blind visual QA over 11 additional centerline-clear view pairs; 3 PASS, 6 WARN, 2 FAIL candidate split."
    - id: grscenes_vlm_pass_only_target_projection_qa
      path: paper/shared/evidence/raw/grscene_vlm_grounding/pass_only_target_projection_qa_report.json
      description: "Combined projection-label artifact for the four visual-QA PASS original/converted pairs; label provenance only, not model-result evidence."
    - id: grscenes_vlm_canonical_run_manifest
      path: paper/shared/evidence/raw/grscene_vlm_grounding/canonical_vlm_run_manifest.json
      description: "Canonical VLM input/protocol and claim-gate manifest: 4 PASS pairs, 11 WARN retake candidates, 6 FAIL exclusions, pilot-only status, and final_benchmark_claimable=false."
    - id: grscenes_vlm_projection_center_baseline_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/projection_center_baseline_predictions.jsonl.metadata.json
      description: "Provenance for deterministic projection-center scoring-smoke predictions; smoke-only and not VLM output evidence."
    - id: grscenes_vlm_projection_center_baseline_score_summary
      path: paper/shared/evidence/raw/grscene_vlm_grounding/projection_center_baseline_score_summary.json
      description: "Score pipeline smoke summary over deterministic bbox-center predictions; not task-performance or VLM robustness evidence."
    - id: grscenes_vlm_gemma4_p01_probe_predictions
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_p01_predictions.jsonl
      description: "First local Gemma4 real-model probe on one visually accepted bottle pair; isolated probe, not canonical predictions.jsonl."
    - id: grscenes_vlm_gemma4_p01_probe_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_p01_predictions.jsonl.metadata.json
      description: "Provenance sidecar for the first local Gemma4 real-model probe."
    - id: grscenes_vlm_gemma4_p01_probe_score
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_p01_score_summary.json
      description: "Score summary for the Gemma4 P01 probe; raw-pixel point scoring misses while normalized-1000 point scoring hits."
    - id: grscenes_vlm_gemma4_visual_qa_pass_warn_predictions
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_visual_qa_pass_warn_predictions.jsonl
      description: "Local Gemma4 probe on the 6 PASS/WARN visual-QA pairs; isolated probe, not canonical predictions.jsonl."
    - id: grscenes_vlm_gemma4_visual_qa_pass_warn_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_visual_qa_pass_warn_predictions.jsonl.metadata.json
      description: "Provenance sidecar for the Gemma4 PASS/WARN visual-QA subset probe."
    - id: grscenes_vlm_gemma4_visual_qa_pass_warn_selection
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_visual_qa_pass_warn_selection.json
      description: "Machine-readable visual-QA tier selection and pilot-only claim boundary for the Gemma4 PASS/WARN subset."
    - id: grscenes_vlm_gemma4_visual_qa_pass_warn_score
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_visual_qa_pass_warn_score_summary.json
      description: "Score summary for the Gemma4 PASS/WARN visual-QA subset; normalized-1000 point scoring is pilot evidence only."
    - id: grscenes_vlm_gemma4_pass_only_predictions
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_predictions.jsonl
      description: "Local Gemma4 probe on the four visual-QA PASS pairs; isolated probe, not canonical predictions.jsonl."
    - id: grscenes_vlm_gemma4_pass_only_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_predictions.jsonl.metadata.json
      description: "Provenance sidecar for the Gemma4 PASS-only probe."
    - id: grscenes_vlm_gemma4_pass_only_selection
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_selection.json
      description: "Machine-readable visual-QA PASS-only selection for the Gemma4 probe."
    - id: grscenes_vlm_gemma4_pass_only_score
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_score_summary.json
      description: "Score summary for the Gemma4 PASS-only probe; normalized-1000 original 4/4 and converted 3/4 pilot evidence."
    - id: grscenes_vlm_qwen25_pass_only_json_predictions
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_predictions.jsonl
      description: "Failed Qwen2.5-VL direct-JSON PASS-only probe; response-format diagnostic with zero parsed answers or points."
    - id: grscenes_vlm_qwen25_pass_only_json_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_predictions.jsonl.metadata.json
      description: "Provenance sidecar for the failed Qwen2.5-VL direct-JSON PASS-only diagnostic."
    - id: grscenes_vlm_qwen25_pass_only_json_score
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_score_summary.json
      description: "Score summary for the failed Qwen2.5-VL direct-JSON diagnostic; no scored answers or points."
    - id: grscenes_vlm_qwen25_pass_only_structured_predictions
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_predictions.jsonl
      description: "Qwen2.5-VL structured-text probe on the four visual-QA PASS pairs; isolated probe, not canonical predictions.jsonl."
    - id: grscenes_vlm_qwen25_pass_only_structured_predictions_metadata
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_predictions.jsonl.metadata.json
      description: "Provenance sidecar for the Qwen2.5-VL structured-text PASS-only probe."
    - id: grscenes_vlm_qwen25_pass_only_structured_selection
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_selection.json
      description: "Machine-readable visual-QA PASS-only selection for the Qwen2.5-VL structured-text probe and failed JSON diagnostic."
    - id: grscenes_vlm_qwen25_pass_only_structured_score
      path: paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_score_summary.json
      description: "Score summary for the Qwen2.5-VL structured-text PASS-only probe; second-backend protocol-sensitivity pilot evidence."
  figures:
    - paper/shared/figures/fig_render_pairs.pdf
    - paper/shared/figures/fig_image_quality.pdf
    - paper/shared/figures/fig_feature_similarity.pdf
    - paper/shared/figures/fig_tsne_dino.pdf
    - paper/shared/figures/fig_method_pipeline.pdf
    - paper/shared/figures/fig_grscene_qualitative.pdf
  tables:
    - id: grscenes_vlm_pass_only_pilot
      outputs:
        - paper/shared/tables/grscenes_vlm_pass_only_pilot.csv
        - paper/shared/tables/tab_grscenes_vlm_pass_only_pilot.tex
      generated_by: paper/shared/tables/gen_vlm_pilot_tables.py
      sources:
        - paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_score_summary.json
        - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_score_summary.json
        - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_score_summary.json
      description: "Pilot-only table source and LaTeX for the four-pair GRScenes PASS-only Gemma4/Qwen grounding probes."
  provenance:
    experiments: paper/shared/evidence/experiments/
    references: paper/shared/evidence/references/
    reviews: paper/shared/evidence/reviews/
reviews:
  - id: workshop_official_reviews_raw
    path: paper/shared/evidence/reviews/2026-05-workshop-official-reviews-raw.md
    description: "Official workshop reviews and acceptance decision copied from OpenReview export."
  - id: workshop_to_aaai27_revision_roadmap
    path: paper/shared/evidence/reviews/2026-05-workshop-to-aaai27-revision-roadmap.md
    description: "Structured revision themes and AAAI 2027 action plan derived from official workshop reviews."
