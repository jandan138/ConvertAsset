      description: "Expanded material-shift stress VLM input/protocol manifest: 30 PASS/WARN zoom pairs, 60 scoring records, model-run-ready=true, and the manifest-internal stress gate opened after canonical stress predictions/scores; paper claims are bounded to the frozen target-centered stress set."
    - id: material_effect_baseline_sample_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/effect_sample_manifest.json
      description: "Material-effect sample-selection manifest linking GRScenes expanded30 stress pairs to MDL files and effect labels. It covers opacity/transparency, emission, normal/bump, and displacement/height in the GRScenes pool, and records clearcoat/procedural texture as missing bins requiring official/sample-asset supplementation before full baseline claims."
    - id: material_effect_supplemental_candidate_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_effect_candidate_manifest.json
      description: "Bounded local official/sample candidate manifest for the missing clearcoat and procedural texture bins. It recommends an Isaac Sim material-library clearcoat source and an NVIDIA MDL SDK tutorial procedural source; wrapper and condition outcomes are recorded in the supplemental wrapper/conversion manifests."
    - id: material_effect_supplemental_wrapper_stage_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_wrapper_stage_manifest.json
      description: "Repo-resident wrapper-stage manifest for supplemental clearcoat and procedural texture fixtures. Both wrappers bind official/sample MDL sources to small renderable targets and are ready for supplemental baseline conversion."
    - id: material_effect_supplemental_conversion_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_conversion_manifest.json
      description: "Supplemental original/noMDL/NVIDIA static-gate condition manifest for clearcoat and procedural texture wrappers. ConvertAsset no-MDL passes both wrappers; NVIDIA passes procedural texture but fails clearcoat by producing an output with zero shader records."
    - id: material_effect_supplemental_fixtures
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_fixtures/
      description: "Small repo-resident supplemental wrapper USD stages plus ConvertAsset no-MDL outputs and audit sidecars for clearcoat and procedural texture."
    - id: material_effect_nvidia_baseline_smoke
      path: paper/shared/evidence/raw/material_effect_baseline/nvidia_baseline_smoke_manifest.json
      description: "NVIDIA Asset Converter smoke over NVIDIA's official MDL fixture. The installed Isaac Sim converter produced two claimable USD PreviewSurface baseline candidates, usd_to_usd_preview and usd_to_usd_bake_flag, each with 4 PreviewSurface shaders and 0 active MDL source-asset shaders. This gates sample-level baseline conversion but is not itself a ConvertAsset-vs-NVIDIA comparison."
    - id: material_effect_nvidia_sample_conversion
      path: paper/shared/evidence/raw/material_effect_baseline/nvidia_sample_conversion_manifest.json
      description: "Sample-level NVIDIA Asset Converter run over the five unique selected GRScenes source scenes. All five usd_to_usd_preview conversions succeeded and produced external USD outputs under the normalized research root; this manifest records paths, hashes, sizes, and conversion provenance."
    - id: material_effect_baseline_conversion_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/baseline_conversion_manifest.json
      description: "Sample-level condition manifest for the GRScenes material-effect baseline: 30 selected samples across 5 unique source scenes have static-gated original_MDL, existing_noMDL, and NVIDIA usd_to_usd_preview condition records. Clearcoat/procedural coverage is supplied separately by supplemental wrapper manifests."
    - id: material_effect_failure_case_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/effect_failure_case_manifest.json
      description: "Effect-labeled follow-up case manifest derived from the baseline, supplemental conversion, and supplemental visual-QA manifests. Current case count is one: NVIDIA drops shader material output on the supplemental clearcoat wrapper, and the same case links to a near-black rendered failure image."
    - id: material_effect_qualitative_render_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/qualitative_render_manifest.json
      description: "Selected qualitative render manifest for four covered-bin expanded30 cases. It links existing original/no-MDL target-centered renders with matched NVIDIA render records and records that 12/12 selected condition images are ready."
    - id: material_effect_qualitative_camera_stage_authoring
      path: paper/shared/evidence/raw/material_effect_baseline/qualitative_camera_stage_authoring_report.json
      description: "Camera-stage authoring report for the selected NVIDIA qualitative views; 4/4 camera stages authored with the same target-centered camera settings."
    - id: material_effect_qualitative_nvidia_render_run
      path: paper/shared/evidence/raw/material_effect_baseline/qualitative_nvidia_render_run_manifest.json
      description: "Selected-only NVIDIA qualitative render run manifest. The current run records 4/4 NVIDIA outputs ready and zero failed selected renders."
    - id: material_effect_qualitative_renders
      path: paper/shared/evidence/raw/material_effect_baseline/qualitative_renders/
      description: "Repo-resident selected NVIDIA stills and camera stages for the material-effect qualitative panel."
    - id: material_effect_supplemental_qualitative_render_manifest
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_qualitative_render_manifest.json
      description: "Supplemental clearcoat/procedural qualitative render manifest. It records 2/2 ready cases and 6/6 ready original/noMDL/NVIDIA condition images; the NVIDIA clearcoat condition remains a static-gate-failed baseline row."
    - id: material_effect_supplemental_qualitative_render_run
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_qualitative_render_run_manifest.json
      description: "Isaac Sim viewport-capture run manifest for the supplemental material-effect stills; current run attempted six renders and produced six ready outputs with zero failed render commands."
    - id: material_effect_supplemental_qualitative_visual_qa
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_qualitative_visual_qa.json
      description: "Machine visual-QA summary for supplemental clearcoat/procedural stills. It flags one rendered failure candidate: NVIDIA clearcoat is near-black after static-gate-failed conversion; the clean-room visual review records the broader visual verdict."
    - id: material_effect_supplemental_clean_room_visual_review
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_clean_room_visual_review.json
      description: "Clean-room human-style visual review over the six supplemental clearcoat/procedural stills. Overall verdict is FAIL: clearcoat NVIDIA misses the target, procedural ConvertAsset/NVIDIA lose the checker pattern, and the panel is not ready for a success-style qualitative figure."
    - id: material_effect_supplemental_material_preservation_diagnostic
      path: paper/shared/evidence/raw/material_effect_baseline/supplemental_material_preservation_diagnostic.json
      description: "PXR static USD-network diagnostic for the two supplemental clearcoat/procedural fixtures. It records two failed cases: NVIDIA clearcoat output is missing the target prim, and both ConvertAsset no-MDL and NVIDIA procedural outputs lack checker/base-color texture preservation evidence."
    - id: material_effect_risk_profile
      path: paper/shared/evidence/raw/material_effect_baseline/material_effect_risk_profile.json
      description: "Effect-level claim-boundary matrix derived from the baseline/supplemental manifests, selected qualitative manifest, clean-room visual review, and PXR diagnostic. It marks four GRScenes-covered bins as bounded static/selected-qualitative evidence, NVIDIA clearcoat as a selected failure case, and procedural texture as a limitation case where both converted conditions lose checker preservation evidence."
    - id: reviewer_closure_statistical_summary
      path: paper/shared/evidence/raw/reviewer_closure_package/reviewer_closure_statistical_summary.json
      description: "Reviewer-closure paired bootstrap confidence intervals for the existing expanded30 VLM evidence and official KuJiaLe InternNav val_unseen 99-episode evidence. Descriptive CI evidence only; not a population-level robustness guarantee."
    - id: reviewer_closure_vlm_coordinate_baselines
