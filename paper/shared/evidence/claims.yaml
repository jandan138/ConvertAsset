schema_version: 1
claims:
  - id: visual_quality_mean
    statement: "The converted assets preserve high visual fidelity with mean PSNR 35.52 dB, SSIM 0.990, and LPIPS 0.020."
    sources:
      - paper/shared/evidence/raw/image_quality.csv
    scope: "Four chest-of-drawers assets rendered from six matched viewpoints."
  - id: semantic_similarity_mean
    statement: "The converted assets maintain strong feature-level similarity with CLIP cosine similarity 0.925 and DINOv2 cosine similarity 0.872."
    sources:
      - paper/shared/evidence/raw/feature_similarity.csv
      - paper/shared/evidence/raw/clip_embeddings.npz
      - paper/shared/evidence/raw/dino_embeddings.npz
    scope: "Matched MDL and UsdPreviewSurface render pairs from the current evidence set."
  - id: grscene_startup
    statement: "The supplemental GRScenes benchmark reaches a fully warmed ready-to-render state 3.8x faster and uses roughly 200 MB less GPU memory after conversion."
    sources:
      - paper/shared/evidence/raw/perf_benchmark_grscene.csv
    scope: "Single-scene GRScenes startup benchmark retained from the CVPR workshop draft."
  - id: grscenes_vlm_gemma4_pass_only_pilot
    statement: "In a four-pair visual-QA PASS-only GRScenes pilot, local Gemma4 answered the target category correctly for all original and converted renders; under normalized-1000 coordinate scoring, point-in-box accuracy was 4/4 for original renders and 3/4 for converted renders."
    sources:
      - paper/shared/evidence/raw/grscene_vlm_grounding/pass_only_target_projection_qa_report.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_vlm_run_manifest.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_predictions.jsonl
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_selection.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/gemma4_pass_only_score_summary.json
    scope: "Pilot-only real-model probe over four blind-visual-QA PASS original/converted GRScenes pairs; the canonical VLM run manifest records `claim_status=pilot_only` and `final_benchmark_claimable=false`."
  - id: grscenes_vlm_qwen25_pass_only_diagnostic
    statement: "On the same four-pair PASS-only GRScenes pilot, Qwen2.5-VL exposed response-format and coordinate-protocol sensitivity: direct JSON prompting yielded zero parsed answers or points, while structured-text prompting produced 8/8 scorable answer rows with answer accuracy 3/4 for both material conditions under the current strict expected-label matcher, point-row coverage 3/4 original and 4/4 converted, raw point-in-box 2/3 for original and 2/4 for converted among parsed points, and normalized-1000 point-in-box 0/3 for original and 0/4 for converted."
    sources:
      - paper/shared/evidence/raw/grscene_vlm_grounding/pass_only_target_projection_qa_report.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_vlm_run_manifest.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_predictions.jsonl
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_predictions.jsonl.metadata.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_score_summary.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_predictions.jsonl
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_predictions.jsonl.metadata.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_selection.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/probes/qwen25_pass_only_structured_score_summary.json
    scope: "Pilot-only diagnostic over four visual-QA PASS original/converted GRScenes pairs; use as protocol-sensitivity evidence, not as a final VLM robustness claim. The canonical VLM run manifest keeps this evidence under `pilot_only` claim status."
  - id: grscenes_vlm_canonical_frozen_protocol_pilot
    statement: "Under the frozen manifest-aligned protocol (`normalized_1000` coordinates plus `structured_text` responses) on the same four visual-QA PASS GRScenes pairs, Gemma4 produced 8/8 scorable answers with 4/4 answer accuracy for both original and converted renders, and normalized-1000 point-in-box accuracy of 2/4 original and 3/4 converted. Qwen2.5-VL produced 8/8 scorable answers with 3/4 answer accuracy for both material conditions, normalized-1000 point-in-box accuracy of 0/3 original and 0/4 converted among parsed points, and raw point-in-box accuracy of 2/3 original and 2/4 converted."
    sources:
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_vlm_run_manifest.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/gemma4_canonical_pass_only_predictions.jsonl
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/gemma4_canonical_pass_only_predictions.jsonl.metadata.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/gemma4_canonical_pass_only_score_summary.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/qwen25_canonical_pass_only_predictions.jsonl
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/qwen25_canonical_pass_only_predictions.jsonl.metadata.json
      - paper/shared/evidence/raw/grscene_vlm_grounding/canonical_probes/qwen25_canonical_pass_only_score_summary.json
    scope: "Pilot-only manifest-aligned rerun over four blind-visual-QA PASS original/converted GRScenes pairs; not root canonical `predictions.jsonl` / `score_summary.json`, and not final benchmark evidence while `final_benchmark_claimable=false`."
review_requirements:
  - "Re-check every numerical statement after AAAI 2027 narrative edits."
  - "Update this file in the same change as any result, table, figure, seed, or claim change."
  - "Treat `grscenes_vlm_gemma4_pass_only_pilot` as a historical pre-freeze pilot probe; prefer `grscenes_vlm_canonical_frozen_protocol_pilot` when discussing the frozen prompt contract."
  - "Treat `grscenes_vlm_qwen25_pass_only_diagnostic` as historical response-format evidence; prefer the canonical frozen-protocol rerun when discussing the current Qwen coordinate policy."
  - "Do not promote `grscenes_vlm_canonical_frozen_protocol_pilot` beyond pilot evidence until the PASS pool is expanded and root canonical score files are produced from a final-claimable manifest."
  - "Do not generate final VLM performance tables from any run whose `canonical_vlm_run_manifest.json` claim gate has `final_benchmark_claimable=false`."
